<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grande Kermesse Scolaire 2026</title>
    <style>
        body {
            background: linear-gradient(45deg, orange, yellow);
            font-family: Arial, sans-serif;
            color: #333;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 50px;
        }
        #ticket-system, #admin-panel, #qr-code, #google-maps, #whatsapp-integration {
            margin: 20px auto;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background: rgba(255,255,255,0.8);
            max-width: 600px;
        }
        footer {
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Grande Kermesse Scolaire 2026</h1>
        <h2>Get Your Tickets Now!</h2>
    </header>
    <section id="ticket-system">
        <h3>Ticket System</h3>
        <form>
            <label for="ticket-number">Number of Tickets:</label>
            <input type="number" id="ticket-number" name="ticket-number" min="1" required>
            <button type="submit">Buy Tickets</button>
        </form>
    </section>
    <section id="qr-code">
        <h3>Your QR Code</h3>
        <img src="path_to_qr_code.png" alt="QR Code">
    </section>
    <section id="google-maps">
        <h3>Find Us Here</h3>
        <div id="map" style="height: 400px;"></div>
        <script>
            function initMap() {
                var location = { lat: -34.397, lng: 150.644 };
                var map = new google.maps.Map(document.getElementById('map'), {
                    zoom: 8,
                    center: location
                });
                var marker = new google.maps.Marker({
                    position: location,
                    map: map
                });
            }
        </script>
        <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
        </script>
    </section>
    <section id="whatsapp-integration">
        <h3>Contact Us via WhatsApp</h3>
        <a href="https://api.whatsapp.com/send?text=Hello,%20I%20am%20interested%20in%20the%20Grande%20Kermesse%20Scolaire%202026!" target="_blank">
            <button>Chat on WhatsApp</button>
        </a>
    </section>
    <section id="admin-panel">
        <h3>Admin Panel</h3>
        <p>Admin Login:</p>
        <form>
            <label for="admin-username">Username:</label>
            <input type="text" id="admin-username" name="admin-username" required>
            <label for="admin-password">Password:</label>
            <input type="password" id="admin-password" name="admin-password" required>
            <button type="submit">Login</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 Grande Kermesse Scolaire. All rights reserved.</p>
    </footer>
</body>
</html>
